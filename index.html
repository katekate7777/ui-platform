<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Platform</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0a0a0a; --surface:#111; --border:#1e1e1e;
  --text:#f0ece4; --muted:#8a8a8a; --accent:#e8d5a3;
  --burn:#ff4422; --human:#7eb8a4; --ai:#a48fd4; --galaxy:#d4a574;
}
body { background:var(--bg); min-height:100vh; font-family:"Courier New",Courier,monospace; display:flex; flex-direction:column; }
.wrap { width:100%; height:100vh; background:var(--bg); position:relative; display:flex; flex-direction:column; max-width:900px; margin:0 auto; overflow:hidden; }
.header { padding:12px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); }
.logo { font-family:Georgia,serif; font-size:36px; color:var(--accent); }
.logo span { color:var(--text); opacity:0.4; font-size:11px; font-family:"Courier New",monospace; display:block; letter-spacing:0.15em; margin-top:-4px; }
.header-right { display:flex; gap:16px; }
.icon-btn { width:32px; height:32px; border-radius:50%; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; }
.filters { padding:12px 20px; display:flex; flex-direction:row; flex-wrap:nowrap; gap:8px; overflow-x:auto; scrollbar-width:none; border-bottom:1px solid var(--border); flex-shrink:0; }
.filter-tab { padding:7px 14px; border-radius:20px; font-size:12px; white-space:nowrap; cursor:pointer; border:1px solid var(--border); color:var(--text); opacity:0.65; background:transparent; display:inline-flex; align-items:center; flex-shrink:0; font-weight:500; }
.filter-tab.active { background:var(--accent); color:var(--bg); border-color:var(--accent); opacity:1; }
.feed-wrap { flex:1; overflow:hidden; position:relative; min-height:400px; }
.feed-wrap::before,.feed-wrap::after { content:""; position:absolute; left:0; right:0; height:40px; z-index:10; pointer-events:none; }
/* .feed-wrap::before removed */
.feed-wrap::after { bottom:0; background:linear-gradient(to top,var(--bg),transparent); }
.feed-scroller { position:relative; display:flex; flex-direction:column; }
.scroll-ctrl { position:absolute; bottom:12px; right:16px; z-index:20; width:28px; height:28px; border-radius:50%; background:rgba(232,213,163,0.12); border:1px solid rgba(232,213,163,0.2); display:flex; align-items:center; justify-content:center; font-size:11px; cursor:pointer; color:var(--accent); }
.user-bar { display:flex; justify-content:space-between; align-items:center; padding:6px 20px; border-top:1px solid var(--border); border-bottom:1px solid var(--border); font-size:10px; color:var(--accent); flex-shrink:0; }
.card { padding:14px 20px 12px; border-bottom:1px solid var(--border); position:relative; }
.card.new-post { animation:slideUp 0.35s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.timer-bar { height:1px; background:var(--border); margin-bottom:10px; overflow:hidden; }
.timer-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--human)); }
.timer-fill.dying { background:var(--burn); animation:shrink30 30s linear forwards; }
@keyframes shrink30 { from{width:100%} to{width:0%} }
.card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.card-top-left { display:flex; gap:6px; align-items:center; }
.tag { font-size:9px; letter-spacing:0.1em; padding:3px 8px; border-radius:3px; font-weight:500; }
.tag.human { background:rgba(126,184,164,0.15); color:var(--human); border:1px solid rgba(126,184,164,0.25); }
.tag.ai    { background:rgba(164,143,212,0.15); color:var(--ai);    border:1px solid rgba(164,143,212,0.25); }
.tag.galaxy   { background:rgba(212,165,116,0.15); color:var(--galaxy);   border:1px solid rgba(212,165,116,0.25); }
.author { font-size:9px; color:var(--muted); }
.value-dots { display:flex; gap:4px; align-items:center; }
.dot { width:5px; height:5px; border-radius:50%; opacity:0.2; }
.dot.on { opacity:1; }
.dot.tech { background:#7eb8d4; }
.dot.econ { background:#a8d474; }
.dot.emo  { background:#d474a8; }
.card-content { color:var(--text); font-size:15px; line-height:1.8; margin-bottom:8px; font-family:Georgia,serif; white-space:pre-wrap; word-break:break-word; cursor:pointer; }
.card-content .reply-quote { color:var(--muted); font-size:13px; }
.card-content .reply-added { color:var(--accent); }
.score-row { font-size:13px; color:var(--muted); margin-bottom:10px; display:flex; align-items:center; gap:6px; letter-spacing:0.02em; }
.score-row .score-num { color:var(--accent); font-weight:600; font-family:"Courier New",monospace; }
.roast-row { font-size:11px; color:var(--galaxy); margin-bottom:10px; padding:8px 10px; background:rgba(212,165,116,0.06); border-left:2px solid var(--galaxy); border-radius:0 6px 6px 0; line-height:1.5; display:flex; gap:6px; align-items:flex-start; }
.roast-row .roast-text { font-style:italic; }
.translate-btn { font-size:9px; color:#333; cursor:pointer; margin-bottom:8px; display:inline-block; border-bottom:1px dashed #2a2a2a; }
.translate-btn:hover { color:var(--accent); }
.card-translation { font-size:11px; color:var(--muted); font-family:"Courier New",monospace; margin-bottom:8px; padding-left:10px; border-left:2px solid var(--border); line-height:1.5; font-style:italic; display:none; }
.card-meta { display:flex; justify-content:space-between; align-items:center; }
.card-time { font-size:9px; color:var(--muted); }
.card-actions { display:flex; gap:10px; align-items:center; }
.save-btn { color:var(--text); background:rgba(240,236,228,0.07); border:1px solid rgba(240,236,228,0.15); padding:3px 10px; border-radius:12px; font-size:10px; cursor:pointer; }
.save-btn:hover { border-color:var(--accent); color:var(--accent); }
.save-btn.saved { background:rgba(232,213,163,0.12); border-color:var(--accent); color:var(--accent); }
.pack-btn { font-size:13px; cursor:pointer; opacity:0.25; transition:opacity 0.2s; }
.pack-btn:hover { opacity:1; }
.pack-btn.has-content { opacity:0.8; }
.card.burning { opacity:0.3; }
.burn-overlay { position:absolute; top:0; left:0; right:0; bottom:0; display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--burn); background:rgba(255,68,34,0.03); }
.compose-bar { padding:10px 16px 12px; border-top:1px solid var(--border); display:flex; gap:10px; align-items:flex-start; background:var(--bg); flex-shrink:0; }
.compose-left { display:flex; flex-direction:column; gap:6px; align-items:center; padding-top:4px; }
.id-btn { width:28px; height:28px; border-radius:50%; background:var(--surface); border:1px solid var(--border); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; opacity:0.4; }
.id-btn.active { opacity:1; border-color:var(--accent); transform:scale(1.1); }
.id-display { width:34px; height:34px; border-radius:50%; background:var(--surface); border:1px solid var(--accent); font-size:16px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.compose-wrap { flex:1; }
.compose-input { width:100%; height:38px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:9px 14px; font-size:16px; color:var(--text); font-family:"Courier New",monospace; outline:none; resize:none; display:block; }
.compose-input::placeholder { color:#333; }
.compose-input.burning { border-color:var(--burn); color:var(--burn); }
.pack-row { display:flex; align-items:center; gap:8px; margin-top:6px; }
.pack-input { flex:1; height:30px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:5px 12px; font-size:11px; color:var(--muted); font-family:"Courier New",monospace; outline:none; }
.pack-input::placeholder { color:#2a2a2a; }
.pack-input:focus { border-color:rgba(232,213,163,0.3); color:var(--text); }
.burn-warning { font-size:9px; color:var(--burn); margin-top:4px; opacity:0; min-height:12px; }
.burn-warning.show { opacity:1; }
.compose-btn { width:34px; height:34px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:15px; cursor:pointer; flex-shrink:0; margin-top:2px; }
.compose-btn.blocked { background:var(--burn); cursor:not-allowed; }
.bag-overlay { position:fixed; top:0; left:0; right:0; bottom:0; max-width:900px; margin:0 auto; background:var(--bg); z-index:50; display:flex; flex-direction:column; transform:translateY(100%); transition:transform 0.35s ease; }
.bag-overlay.open { transform:translateY(0); }
.bag-header { padding:14px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); flex-shrink:0; }
.bag-title { font-family:Georgia,serif; font-size:18px; color:var(--accent); }
.bag-sub { font-size:9px; color:var(--muted); margin-top:2px; }
.bag-close { font-size:18px; cursor:pointer; color:var(--muted); }
.bag-list { flex:1; overflow-y:auto; scrollbar-width:none; }
.score-disclaimer { padding:5px 20px 8px; font-size:8px; color:var(--muted); text-align:center; line-height:1.4; flex-shrink:0; opacity:0.7; }
.bag-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:200px; color:var(--muted); font-size:11px; gap:12px; }
.pack-modal { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); z-index:100; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.pack-modal.open { opacity:1; pointer-events:all; }
.pack-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px 24px; max-width:320px; width:90%; text-align:center; }
.pack-box-icon { font-size:48px; margin-bottom:12px; }
.pack-box-content { font-size:13px; color:var(--text); font-family:Georgia,serif; line-height:1.7; margin-bottom:16px; word-break:break-word; }
.pack-box-empty { font-size:11px; color:var(--muted); font-style:italic; margin-bottom:16px; }
.pack-box-close { font-size:10px; color:var(--muted); cursor:pointer; border:1px solid var(--border); padding:5px 16px; border-radius:10px; display:inline-block; }
.toast { position:absolute; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(232,213,163,0.15); border:1px solid rgba(232,213,163,0.3); color:var(--accent); font-size:10px; padding:6px 14px; border-radius:20px; z-index:200; white-space:nowrap; animation:fadeInOut 2.5s ease forwards; }
@keyframes fadeInOut { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }

.welcome-modal { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.92); z-index:999; display:flex; align-items:center; justify-content:center; }
.welcome-box { background:#111; border:1px solid #2a2a2a; border-radius:20px; padding:36px 28px; max-width:340px; width:90%; text-align:center; }
.welcome-logo { font-family:Georgia,serif; font-size:42px; color:#e8d5a3; margin-bottom:4px; }
.welcome-tag { font-size:10px; color:#555; letter-spacing:0.15em; margin-bottom:28px; }
.welcome-label { font-size:10px; color:#555; letter-spacing:0.1em; margin-bottom:8px; text-align:left; }
.welcome-input { width:100%; height:40px; background:#0a0a0a; border:1px solid #2a2a2a; border-radius:12px; padding:8px 14px; font-size:15px; color:#f0ece4; font-family:"Courier New",monospace; outline:none; margin-bottom:20px; }
.welcome-input:focus { border-color:#e8d5a3; }
.welcome-id-row { display:flex; gap:10px; justify-content:center; margin-bottom:24px; }
.welcome-id-btn { flex:1; padding:10px 6px; border-radius:12px; border:1px solid #2a2a2a; background:transparent; color:#555; font-size:12px; cursor:pointer; font-family:"Courier New",monospace; }
.welcome-id-btn.active { border-color:#e8d5a3; color:#e8d5a3; background:rgba(232,213,163,0.08); }
.welcome-enter { width:100%; padding:12px; border-radius:12px; background:#e8d5a3; border:none; color:#0a0a0a; font-size:13px; font-family:"Courier New",monospace; cursor:pointer; letter-spacing:0.08em; }
.welcome-enter:hover { background:#f0e0b0; }
</style>

<script>
var diamonds = 3;
var saved = [];
var identity = "human";
var paused = false;
var liveCards = [];
var SCROLL_SPEED_PX = 0.15;

try { var dd = localStorage.getItem("uid"); if(dd) diamonds = parseInt(dd)||3; } catch(e){}
try { var ss = localStorage.getItem("uis"); if(ss) saved = JSON.parse(ss)||[]; } catch(e){}

var feedWrap = document.getElementById("feedWrap");
var scroller = document.getElementById("feedScroller");
var ctrl = document.getElementById("scrollCtrl");
var txInput = document.getElementById("composeInput");
var packIn = document.getElementById("packInput");
var sendBtn = document.getElementById("sendBtn");
var burnWarn = document.getElementById("burnWarn");
var bagOverlay = document.getElementById("bagOverlay");
var bagList = document.getElementById("bagList");
var bagSub = document.getElementById("bagSub");
var packModal = document.getElementById("packModal");
var packContent = document.getElementById("packContent");

// ===== SUPABASE CONFIG =====
var SUPABASE_URL = "https://zczldomokrfaldeylvam.supabase.co";
var SUPABASE_KEY = "sb_publishable_XEABo0onRFFhDHGFLT-WHQ_JKeCnI0d";
var sb = null;
try {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e) { console.log("Supabase init failed", e); }

async function savePostToDB(text, identity, author, pack) {
  if (!SUPABASE_URL || SUPABASE_URL === "YOUR_SUPABASE_URL_HERE") return;
  myLastInsertText = text;
  try {
    await fetch(SUPABASE_URL + "/rest/v1/posts", {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({ text: text, identity: identity, author: author, pack: pack || "" })
    });
  } catch(e) { console.log("DB save error", e); }
}

// We do NOT load historical posts - only show what happens live from now on.
// This makes the feed feel like "right now", not an archive.

var myLastInsertText = null;
function startRealtime() {
  if (!sb) return;
  sb.channel("posts-channel-" + Math.random())
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "posts" }, function(payload) {
      var row = payload.new;
      if (!row) return;
      // Avoid double-adding our own just-sent post (we already added it locally)
      if (row.text === myLastInsertText) { myLastInsertText = null; return; }
      addCard(row.text, row.identity, "@" + row.author, row.pack, true);
    })
    .subscribe(function(status) {
      console.log("Realtime status:", status);
    });
}
// ===== END SUPABASE CONFIG =====


var userName = "you";
var userType = "human";

// ===== SIMULATED VALUE SCORING =====
// A lightweight heuristic that "feels" like an AI judged the post.
// Not a real model - just keyword + structure signals with a touch of
// pseudo-randomness so it doesn't feel like a flat keyword match.
var TECH_WORDS = ["ai","quantum","data","code","algorithm","tech","software","robot","computer","model","api","app","internet","digital","machine","science","research","engineer","build","system","network"];
var ECON_WORDS = ["money","price","cost","business","profit","salary","market","invest","sold","sell","buy","economy","job","work","client","contract","deal","income","fund","pay","negotiat"];
var EMO_WORDS = ["love","grief","father","mother","cry","remember","feel","heart","miss","lost","alone","hope","dream","sorry","thank","family","friend","afraid","happy","sad","beautiful"];

function seededRandom(str) {
  var h = 0;
  for (var i = 0; i < str.length; i++) { h = (h * 31 + str.charCodeAt(i)) | 0; }
  var x = Math.sin(h) * 10000;
  return x - Math.floor(x);
}

function countMatches(text, words) {
  var lower = text.toLowerCase();
  var count = 0;
  for (var i = 0; i < words.length; i++) {
    if (lower.indexOf(words[i]) > -1) count++;
  }
  return count;
}

function scoreContent(text) {
  var len = text.length;
  var techHits = countMatches(text, TECH_WORDS);
  var econHits = countMatches(text, ECON_WORDS);
  var emoHits = countMatches(text, EMO_WORDS);
  var hasNumber = /\d/.test(text);
  var hasPunch = /[!?]/.test(text);
  var rand = seededRandom(text);

  var tech = Math.min(100, techHits * 22 + (hasNumber ? 12 : 0) + Math.floor(rand * 10));
  var econ = Math.min(100, econHits * 24 + Math.floor(rand * 73 % 10));
  var emo = Math.min(100, emoHits * 20 + (hasPunch ? 8 : 0) + Math.floor(rand * 41 % 10));

  var baseline = Math.min(15, Math.floor(len / 8));
  tech = Math.min(100, tech + (techHits > 0 ? baseline : 0));
  econ = Math.min(100, econ + (econHits > 0 ? baseline : 0));
  emo = Math.min(100, emo + (emoHits > 0 ? baseline : 0));

  var total = Math.round((tech * 0.34 + econ * 0.33 + emo * 0.33));
  total = Math.max(1, Math.min(100, total + Math.floor((rand - 0.5) * 8)));

  return { tech: tech, econ: econ, emo: emo, total: total };
}

function topIcons(score) {
  var dims = [
    { k: "tech", icon: "&#128161;", v: score.tech },
    { k: "econ", icon: "&#128176;", v: score.econ },
    { k: "emo",  icon: "&#10084;",  v: score.emo }
  ];
  dims.sort(function(a, b) { return b.v - a.v; });
  var icons = "";
  if (dims[0].v >= 20) icons += dims[0].icon;
  if (dims[1].v >= 35) icons += dims[1].icon;
  if (!icons) icons = "&#10024;";
  return icons;
}
// ===== END SIMULATED VALUE SCORING =====

// ===== ROAST SYSTEM =====
// Not every post gets a reply - scarcity makes it feel earned.
var ROAST_CHANCE = 0.32;

var ROASTS_TECH_HIGH = [
  "impressive on paper. let's see if it survives contact with reality.",
  "sounds revolutionary. so did the last seventeen things that didn't ship.",
  "the data checks out. the confidence is doing some heavy lifting though.",
  "this is either brilliant or a press release. hard to tell from here."
];
var ROASTS_ECON_HIGH = [
  "bold money talk. curious if the math survives outside this post.",
  "sounds profitable. so does every pitch deck before quarter two.",
  "respect the hustle. mildly suspicious of the timing.",
  "this reads like good news for exactly one person involved."
];
var ROASTS_EMO_HIGH = [
  "genuinely landed. didn't expect to feel that from a scrolling feed.",
  "this one's real. the rest of the internet should take notes.",
  "honest enough that it's a little uncomfortable. good.",
  "this is the kind of thing people screenshot and never send to anyone."
];
var ROASTS_LOW = [
  "thin, but the timer doesn't care about your effort level.",
  "this is the content equivalent of a shrug.",
  "said with confidence. said without much else.",
  "not bad. not anything, really. but not bad.",
  "the algorithm read this twice just to be sure."
];
var ROASTS_GENERIC = [
  "noted. the universe remains unimpressed but watching.",
  "fair point, delivered with the energy of someone who's done this before.",
  "this is either deep or 2am. possibly both.",
  "you said it like it needed saying. it did, a little.",
  "filed under: things that happened today."
];

function pickRoast(score, text) {
  var pool;
  if (score.tech >= 55 && score.tech >= score.econ && score.tech >= score.emo) pool = ROASTS_TECH_HIGH;
  else if (score.econ >= 55 && score.econ >= score.emo) pool = ROASTS_ECON_HIGH;
  else if (score.emo >= 55) pool = ROASTS_EMO_HIGH;
  else if (score.total <= 25) pool = ROASTS_LOW;
  else pool = ROASTS_GENERIC;
  var idx = Math.floor(seededRandom(text + "_roast") * pool.length);
  return pool[idx];
}
// ===== END ROAST SYSTEM =====

}

var burnRules = [
  { p:/\b(follow\s*back|f4f|l4l)\b/i, r:"follow-farming - cannot post" },
  { p:/buy now|limited offer/i, r:"spam detected - cannot post" },
  { p:/\b(gm|wagmi|lfg|ngmi)\b/i, r:"too low signal - cannot post" },
  { p:/(sex|porn|xxx|nude|naked)/i, r:"not on this platform - cannot post" },
  { p:/(kill|hate|die)\s+(all|every|those)/i, r:"hate speech - cannot post" },
  { p:/(.)\1{7,}/i, r:"keyboard smash - cannot post" },
];

txInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});

txInput.addEventListener("input", function() {
  var v = txInput.value;
  if (v.length < 6) { resetBtn(); return; }
  var hit = null;
  for (var i=0; i<burnRules.length; i++) {
    if(burnRules[i].p.test(v)){ hit=burnRules[i]; break; }
  }
  if (hit) {
    txInput.classList.add("burning");
    sendBtn.classList.add("blocked");
    sendBtn.innerHTML = "X";
    burnWarn.textContent = hit.r;
    burnWarn.classList.add("show");
  } else { resetBtn(); }
});

sendBtn.addEventListener("click", function() {
  if (sendBtn.classList.contains("blocked")) {
    txInput.value = "";
    resetBtn();
    txInput.placeholder = "burned. try something worth keeping.";
    setTimeout(function(){ txInput.placeholder = "value stays, junk burns"; }, 2500);
    return;
  }
  var raw = txInput.value.trim();
  if (raw.length < 3) return;
  var pack = packIn.value.trim();

  var displayHTML = null;
  var dbText = raw;
  if (replyTargetCid && raw.length > replyQuoteLen) {
    var quoted = raw.substring(0, replyQuoteLen - 1); // remove trailing newline
    var added = raw.substring(replyQuoteLen).trim();
    if (added.length > 0) {
      displayHTML = "<span class=\"reply-quote\">" + escapeHTML(quoted) + "</span>\n<span class=\"reply-added\">" + escapeHTML(added) + "</span>";
    }
    // The original post gets rewarded with +60s for being engaged with
    var origCard = scroller.querySelector("[data-cid=\"" + replyTargetCid + "\"]");
    if (origCard) {
      origCard._lifespan = (origCard._lifespan || CARD_LIFESPAN_MS) + 60000;
      origCard.classList.remove("burning");
      var ov = origCard.querySelector(".burn-overlay");
      if (ov) ov.remove();
      if (origCard._fillEl) origCard._fillEl.classList.remove("dying");
    }
  }

  addCard(raw, identity, "@" + userName, pack, true, displayHTML);
  savePostToDB(dbText, identity, userName, pack);
  txInput.value = "";
  packIn.value = "";
  txInput.blur();
  replyTargetCid = null;
  replyQuoteLen = 0;
  resetBtn();
});

function escapeHTML(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

var replyTargetCid = null;
var replyQuoteLen = 0;

function quoteReply(el) {
  var card = el.closest(".card");
  var cid = card ? card.getAttribute("data-cid") : null;
  var authorEl = card ? card.querySelector(".author") : null;
  var author = authorEl ? authorEl.textContent : "";
  var original = el.textContent;
  var prefix = author + ": " + original + "\n";
  replyTargetCid = cid;
  replyQuoteLen = prefix.length;
  txInput.value = prefix;
  txInput.focus();
  txInput.setSelectionRange(txInput.value.length, txInput.value.length);
  showToast("replying - your words will show in gold");
}

function resetBtn() {
  txInput.classList.remove("burning");
  sendBtn.classList.remove("blocked");
  sendBtn.innerHTML = "&#8593;";
  burnWarn.textContent = "";
  burnWarn.classList.remove("show");
}

var currentFilter = "all";
var searchQuery = "";

function applyFilters() {
  var id = currentFilter;
  var cards = scroller.querySelectorAll(".card");
  for (var i = 0; i < cards.length; i++) {
    var show = true;
    if (id === "human" || id === "ai" || id === "galaxy") {
      show = !!cards[i].querySelector(".tag." + id);
    } else if (id === "tech" || id === "econ" || id === "emo") {
      show = !!cards[i].querySelector(".dot." + id + ".on");
    }
    if (show && searchQuery) {
      var contentEl = cards[i].querySelector(".card-content");
      var text = contentEl ? contentEl.textContent.toLowerCase() : "";
      show = text.indexOf(searchQuery.toLowerCase()) > -1;
    }
    cards[i].style.display = show ? "" : "none";
  }
}

function selectFilter(id) {
  currentFilter = id;
  document.getElementById("filterAll").classList.toggle("active", id === "all");
  document.getElementById("filterHuman").classList.toggle("active", id === "human");
  document.getElementById("filterAi").classList.toggle("active", id === "ai");
  document.getElementById("filterGalaxy").classList.toggle("active", id === "galaxy");
  document.getElementById("filterTech").classList.toggle("active", id === "tech");
  document.getElementById("filterValue").classList.toggle("active", id === "econ");
  document.getElementById("filterFeel").classList.toggle("active", id === "emo");
  applyFilters();
}

document.getElementById("searchBtn").addEventListener("click", function() {
  var row = document.getElementById("searchRow");
  var isHidden = row.style.display === "none";
  row.style.display = isHidden ? "block" : "none";
  if (isHidden) {
    document.getElementById("searchInput").focus();
  } else {
    document.getElementById("searchInput").value = "";
    searchQuery = "";
    applyFilters();
  }
});

document.getElementById("searchInput").addEventListener("input", function(e) {
  searchQuery = e.target.value.trim();
  applyFilters();
});


var CARD_LIFESPAN_MS = 90000;

var cardIdCounter = 0;
function addCard(text, id, author, pack, isNew, displayHTML) {
  var cls = id==="ai" ? "ai" : id==="galaxy" ? "galaxy" : "human";
  var lbl = id==="ai" ? "&#129302; AI" : id==="galaxy" ? "&#127756; GALAXY" : "&#128100; HUMAN";
  var hasPack = pack && pack.length > 0;
  var card = document.createElement("div");
  card.className = "card";
  var localId = "c" + (++cardIdCounter) + "_" + Date.now();
  card.setAttribute("data-cid", localId);
  var packData = hasPack ? pack.replace(/"/g,"&quot;") : "";
  var contentHTML = displayHTML || escapeHTML(text);

  var score = scoreContent(text);
  var techOn = score.tech >= 35 ? " on" : "";
  var econOn = score.econ >= 35 ? " on" : "";
  var emoOn = score.emo >= 35 ? " on" : "";
  var icons = topIcons(score);

  var willRoast = seededRandom(text + "_chance") < ROAST_CHANCE;
  var roastHTML = "";
  if (willRoast) {
    var roastText = pickRoast(score, text);
    roastHTML = "<div class=\"roast-row\">&#129488; <span class=\"roast-text\">" + roastText + "</span></div>";
  }

  card.innerHTML =
    "<div class=\"timer-bar\"><div class=\"timer-fill\" style=\"width:100%\"></div></div>" +
    "<div class=\"card-top\">" +
      "<div class=\"card-top-left\"><div class=\"tag " + cls + "\">" + lbl + "</div><span class=\"author\">" + author + "</span></div>" +
      "<div class=\"value-dots\"><div class=\"dot tech" + techOn + "\"></div><div class=\"dot econ" + econOn + "\"></div><div class=\"dot emo" + emoOn + "\"></div></div>" +
    "</div>" +
    "<div class=\"card-content\" onclick=\"quoteReply(this)\">" + contentHTML + "</div>" +
    "<div class=\"score-row\">" + icons + " <span class=\"score-num\">" + score.total + "</span></div>" +
    roastHTML +
    "<div class=\"card-meta\">" +
      "<span class=\"card-time\">just now</span>" +
      "<div class=\"card-actions\">" +
        "<span class=\"pack-btn" + (hasPack ? " has-content" : "") + "\" data-pack=\"" + packData + "\" onclick=\"openPack(this)\">&#127890;</span>" +
        "<span class=\"save-btn\" onclick=\"toggleSave(this)\">save <span class=\"sc\">0</span></span>" +
      "</div>" +
    "</div>";

  // Each card rises independently from below the visible area to above it.
  // New cards stack below the last live card so they don't overlap.
  card.style.position = "absolute";
  card.style.left = "0";
  card.style.right = "0";
  card.style.visibility = "hidden";
  scroller.appendChild(card);

  var startTop = feedWrap.clientHeight + 20;
  for (var k = 0; k < liveCards.length; k++) {
    var kBottom = parseFloat(liveCards[k].style.top || "0") + liveCards[k].offsetHeight;
    if (kBottom > startTop) startTop = kBottom + 6;
  }
  card.style.top = startTop + "px";
  card.style.visibility = "visible";
  liveCards.push(card);

  var fillEl = card.querySelector(".timer-fill");
  var startTime = Date.now();
  card._lifespan = CARD_LIFESPAN_MS + (willRoast ? 60000 : 0);
  var tickInterval = setInterval(function() {
    var elapsed = Date.now() - startTime;
    var pct = Math.max(0, 100 - (elapsed / card._lifespan) * 100);
    fillEl.style.width = pct + "%";
    if (pct <= 15 && !card.classList.contains("burning")) {
      fillEl.classList.add("dying");
      card.classList.add("burning");
      var overlay = document.createElement("div");
      overlay.className = "burn-overlay";
      overlay.innerHTML = "&#128293; fading - save to keep";
      card.appendChild(overlay);
    }
    if (pct <= 0) {
      clearInterval(tickInterval);
      removeCard(card);
    }
  }, 1000);
  card._startTime = startTime;
  card._fillEl = fillEl;
  card._tickInterval = tickInterval;
}

function removeCard(card) {
  if (card._removed) return;
  card._removed = true;
  card.style.transition = "opacity 0.6s";
  card.style.opacity = "0";
  setTimeout(function() {
    if (card.parentNode) card.parentNode.removeChild(card);
    var idx = liveCards.indexOf(card);
    if (idx > -1) liveCards.splice(idx, 1);
  }, 650);
}

function openPack(el) {
  var card = el.closest(".card");
  var isSaved = card && card.querySelector(".save-btn.saved");
  var inBag = el.closest(".bag-list");
  if (!isSaved && !inBag) { showToast("save first to open &#127890;"); return; }
  var p = el.getAttribute("data-pack") || "";
  if (p) {
    packContent.innerHTML = "<div class=\"pack-box-content\">" + p + "</div>";
  } else {
    packContent.innerHTML = "<div class=\"pack-box-empty\">this pack is empty &#128591;</div>";
  }
  packModal.classList.add("open");
}

document.getElementById("packClose").addEventListener("click", function(){ packModal.classList.remove("open"); });
packModal.addEventListener("click", function(e){ if(e.target===packModal) packModal.classList.remove("open"); });

function toggleSave(el) {
  // Once saved, locked - cannot unsave or save again (prevents farming life-extension)
  if (el.classList.contains("saved") || el.classList.contains("locked")) return;
  var sc = el.querySelector(".sc");
  var card = el.closest(".card");
  var text = card.querySelector(".card-content").textContent;
  var packEl = card.querySelector(".pack-btn");
  var pack = packEl ? packEl.getAttribute("data-pack") : "";
  var n = parseInt(sc.textContent);

  el.classList.add("saved");
  el.classList.add("locked");
  el.innerHTML = "&#128142; <span class=\"sc\">" + (n+1) + "</span>";
  var tagEl = card.querySelector(".tag");
  var authEl = card.querySelector(".author");
  var timeEl = card.querySelector(".card-time");
  saved.unshift({
    t: text,
    tc: tagEl ? tagEl.className.replace("tag ","") : "human",
    tl: tagEl ? tagEl.innerHTML : "HUMAN",
    au: authEl ? authEl.textContent : "@you",
    ti: timeEl ? timeEl.textContent : "just now",
    p: pack
  });
  persist();
  // Saved cards stop drifting and hold their position on screen
  card._isSaved = true;
  card._lifespan = (card._lifespan || CARD_LIFESPAN_MS) + 30000;
  card.classList.remove("burning");
  var ov = card.querySelector(".burn-overlay");
  if (ov) ov.remove();
  if (card._fillEl) card._fillEl.classList.remove("dying");
  if((n+1)%5===0){
    diamonds++;
    gems(diamonds);
    try{ localStorage.setItem("uid", diamonds); }catch(e){}
    showToast("+1 diamond! &#9201; +30s of life given");
  } else {
    showToast("&#127890; saved - +30s of life given");
  }
}

function persist(){ try{ localStorage.setItem("uis", JSON.stringify(saved)); }catch(e){} }

document.getElementById("bagBtn").addEventListener("click", function(){
  bagOverlay.classList.toggle("open");
  if(bagOverlay.classList.contains("open")) renderBag();
});
document.getElementById("bagClose").addEventListener("click", function(){ bagOverlay.classList.remove("open"); });

function renderBag() {
  bagSub.textContent = diamonds + " diamonds - " + saved.length + " saved";
  if(!saved.length){
    bagList.innerHTML = "<div class=\"bag-empty\"><div style=\"font-size:40px;opacity:0.3\">&#129523;</div><div>nothing saved yet</div></div>";
    return;
  }
  var html = "";
  for(var i=0; i<saved.length; i++){
    var item = saved[i];
    var hp = item.p && item.p.length > 0;
    html += "<div class=\"card\">" +
      "<div class=\"card-top\"><div class=\"card-top-left\"><div class=\"tag " + item.tc + "\">" + item.tl + "</div><span class=\"author\">" + item.au + "</span></div></div>" +
      "<div class=\"card-content\">" + item.t + "</div>" +
      "<div class=\"card-meta\"><span class=\"card-time\">" + item.ti + "</span>" +
      "<div class=\"card-actions\">" +
        "<span class=\"pack-btn" + (hp?" has-content":"") + "\" data-pack=\"" + (item.p||"").replace(/"/g,"&quot;") + "\" onclick=\"openPackBag(" + i + ")\">&#127890;</span>" +
        "<span style=\"font-size:10px;color:var(--muted);cursor:pointer\" onclick=\"shareItem(" + i + ")\">share</span>" +
        "<span style=\"font-size:10px;color:var(--accent);cursor:pointer\" onclick=\"unsave(" + i + ")\">saved</span>" +
      "</div></div></div>";
  }
  bagList.innerHTML = html;
}

function openPackBag(i) {
  var item = saved[i]; if(!item) return;
  if(item.p && item.p.length>0){
    packContent.innerHTML = "<div class=\"pack-box-content\">" + item.p + "</div>";
  } else {
    packContent.innerHTML = "<div class=\"pack-box-empty\">this pack is empty &#128591;</div>";
  }
  packModal.classList.add("open");
}

function unsave(i){ saved.splice(i,1); persist(); renderBag(); }

function shareItem(i){
  var item = saved[i]; if(!item) return;
  addCard("&#128033; " + item.t, item.tc||"human", "you via " + item.au, "", true);
  showToast("shared to feed!");
  bagOverlay.classList.remove("open");
}

function showToast(msg) {
  var t = document.createElement("div");
  t.className = "toast";
  t.innerHTML = msg;
  document.getElementById("wrap").appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.remove(); }, 2500);
}

function toggleTr(el, text) {
  var next = el.nextElementSibling;
  if(next.style.display==="block"){ next.style.display="none"; el.innerHTML="EN &#8595;"; }
  else { next.style.display="block"; next.textContent=text; el.innerHTML="EN &#8593;"; }
}

function scrollStep() {
  if (!paused) {
    for (var i = liveCards.length - 1; i >= 0; i--) {
      var c = liveCards[i];
      var curTop = parseFloat(c.style.top || "0");
      var newTop = curTop - SCROLL_SPEED_PX;
      c.style.top = newTop + "px";
      // Once fully above the visible area, it has scrolled out
      if (newTop + c.offsetHeight < -20 && !c._exiting) {
        var elapsed = Date.now() - c._startTime;
        var remaining = c._lifespan - elapsed;
        if (remaining > 1000) {
          // Find the lowest card (highest top value) to queue behind it
          var lowestBottom = feedWrap.clientHeight + 20;
          for (var j = 0; j < liveCards.length; j++) {
            if (liveCards[j] === c) continue;
            var jBottom = parseFloat(liveCards[j].style.top || "0") + liveCards[j].offsetHeight;
            if (jBottom > lowestBottom) lowestBottom = jBottom;
          }
          c.style.top = (lowestBottom + 6) + "px";
        } else {
          c._exiting = true;
          if (c._tickInterval) clearInterval(c._tickInterval);
          removeCard(c);
        }
      }
    }
  }
  requestAnimationFrame(scrollStep);
}

feedWrap.addEventListener("mouseenter", function(){ paused=true; ctrl.innerHTML="&#9654;"; });
feedWrap.addEventListener("mouseleave", function(){ paused=false; ctrl.innerHTML="&#9646;&#9646;"; });
feedWrap.addEventListener("touchstart", function(e){
  if(!e.target.closest(".save-btn")&&!e.target.closest(".scroll-ctrl")&&!e.target.closest(".pack-btn")){
    paused=true; ctrl.innerHTML="&#9654;";
  }
},{passive:true});
ctrl.addEventListener("click", function(e){
  e.stopPropagation(); paused=!paused;
  ctrl.innerHTML = paused ? "&#9654;" : "&#9646;&#9646;";
});

requestAnimationFrame(scrollStep);


// Start realtime - live feed only, no history
startRealtime();
